apiVersion: apps/v1
kind: Deployment
metadata:
  name: clashvers-server
  namespace: clashvers
spec:
  replicas: 2          # Run 2 copies for high availability
  selector:
    matchLabels:
      app: clashvers-server
  template:
    metadata:
      labels:
        app: clashvers-server
    spec:
      containers:
        - name: server
          image: yourdockerhub/clashvers-server:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: clashvers-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
